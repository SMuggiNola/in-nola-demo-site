  /* Grain texture */
  .grain {
    position: absolute;
    inset: 0;
    z-index: 2;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* Vignette */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(60,40,20,0.35) 100%);
    pointer-events: none;
  }

  .poster-content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 30px 30px 25px;
    text-align: center;
  }

  .presents {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: #5a4a2a;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }

  .presents-org {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: #5a4a2a;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .title-line1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-style: italic;
    font-size: clamp(2.8rem, 8vw, 3.5rem);
    color: #2a6830;
    line-height: 0.95;
    text-shadow: 1px 2px 3px rgba(0,0,0,0.15);
    margin-bottom: 0;
  }

  .title-and {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1.3rem;
    color: #8a6a20;
    margin: 2px 0;
  }

  .title-line2 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-style: italic;
    font-size: clamp(2.8rem, 8vw, 3.5rem);
    color: #2a6830;
    line-height: 0.95;
    text-shadow: 1px 2px 3px rgba(0,0,0,0.15);
    margin-bottom: 10px;
  }

  .byline {
    font-family: 'IM Fell English', serif;
    font-size: 1rem;
    color: #5a4a2a;
    margin-bottom: 2px;
  }

  .author {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.4rem;
    color: #2a6830;
    letter-spacing: 0.08em;
    margin-bottom: 15px;
  }

  .directed {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: #8a6a10;
    margin-bottom: 10px;
  }

  .divider {
    width: 180px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #8a7a3a, transparent);
    margin: 8px auto;
  }

  .interactive-label {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: #7a6a3a;
    letter-spacing: 0.1em;
    margin-bottom: 5px;
    margin-top: 5px;
  }

  .starring {
