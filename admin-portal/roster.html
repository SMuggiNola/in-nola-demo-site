<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../assets/in_logo.png">
  <meta charset="UTF-8">
  <title>Member Roster | Irish Network NOLA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/global.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-svg@1.0.0/dist/qrcode.min.js"></script>
  <script>var QRCodeSVG = QRCode;</script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    .roster-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .roster-header h1 {
      margin: 0;
    }

    .logout-btn {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    /* Add member form */
    .add-form {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .add-form h2 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      color: var(--gold);
    }

    .form-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .form-field {
      flex: 1;
      min-width: 180px;
    }

    .form-field label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
    }

    .form-field input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .form-field input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .add-btn {
      padding: 0.6rem 1.5rem;
      white-space: nowrap;
    }

    /* Credential card shown after adding */
    .credential-card {
      background: rgba(212, 167, 38, 0.1);
      border: 1px solid rgba(212, 167, 38, 0.3);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-top: 1rem;
      display: none;
    }

    .credential-card.visible {
      display: block;
    }

    .credential-card h3 {
      margin: 0 0 0.75rem;
      color: var(--gold);
      font-size: 1rem;
    }

    .credential-card .cred-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
      font-size: 0.95rem;
    }

    .credential-card .cred-label {
      color: var(--text-secondary);
      min-width: 90px;
    }

    .credential-card .cred-value {
      font-family: monospace;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }

    /* Roster table */
    .roster-section h2 {
      font-size: 1.1rem;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .roster-count {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: normal;
    }

    .roster-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
    }

    .roster-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      white-space: nowrap;
    }

    .roster-table th {
      text-align: left;
      padding: 0.5rem 0.65rem;
      color: var(--gold);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      background: rgba(212, 167, 38, 0.08);
      border-bottom: 2px solid var(--glass-border);
      position: sticky;
      top: 0;
    }

    .roster-table td {
      padding: 0.4rem 0.65rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      border-right: 1px solid rgba(255, 255, 255, 0.03);
      color: var(--text-primary);
      vertical-align: middle;
    }

    .roster-table td:last-child {
      border-right: none;
    }

    .roster-table tbody tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.02);
    }

    .roster-table tbody tr:hover td {
      background: rgba(212, 167, 38, 0.06);
    }

    .paid-toggle {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      cursor: pointer;
      user-select: none;
    }

    .paid-toggle .toggle-track {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 12px;
      transition: background 0.2s;
    }

    .paid-toggle .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .paid-toggle.unpaid .toggle-track {
      background: rgba(239, 68, 68, 0.35);
    }

    .paid-toggle.paid .toggle-track {
      background: rgba(34, 197, 94, 0.5);
    }

    .paid-toggle.paid .toggle-thumb {
      transform: translateX(20px);
    }

    .remove-btn {
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 0.25rem 0.6rem;
      border-radius: var(--radius);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition);
    }

    .remove-btn:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: #ef4444;
    }

    .setup-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition);
      user-select: none;
    }

    .setup-badge.unsent {
      background: rgba(212, 167, 38, 0.15);
      color: #d4a726;
      border: 1px solid rgba(212, 167, 38, 0.3);
    }

    .setup-badge.unsent:hover {
      background: rgba(212, 167, 38, 0.25);
    }

    .setup-badge.sent {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .setup-badge.sent:hover {
      background: rgba(34, 197, 94, 0.25);
    }

    .send-all-btn {
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      margin-left: 1rem;
    }

    .remove-msg {
      color: var(--text-secondary);
      font-size: 0.75rem;
      max-width: 160px;
      line-height: 1.3;
    }

    .remove-msg a {
      color: var(--gold);
    }

    .edit-btn {
      background: transparent;
      border: 1px solid rgba(212, 167, 38, 0.3);
      color: var(--gold);
      padding: 0.25rem 0.6rem;
      border-radius: var(--radius);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition);
    }

    .edit-btn:hover {
      background: rgba(212, 167, 38, 0.15);
      border-color: var(--gold);
    }

    .edit-actions {
      display: flex;
      gap: 0.35rem;
    }

    .save-btn {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius);
      font-size: 0.8rem;
      cursor: pointer;
    }

    .cancel-btn {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius);
      font-size: 0.8rem;
      cursor: pointer;
    }

    .roster-table td input.inline-edit {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      color: var(--text-primary);
      padding: 0.3rem 0.5rem;
      font-size: 0.85rem;
      width: 100%;
      min-width: 80px;
    }

    .roster-table td input.inline-edit:focus {
      outline: none;
      border-color: #d4a726;
      box-shadow: 0 0 0 2px rgba(212, 167, 38, 0.2);
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
    }

    .form-error {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }

    .form-error.visible {
      display: block;
    }

    .portal-footer {
      text-align: center;
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .portal-footer a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .portal-footer a:hover {
      color: var(--gold);
    }

    /* QR download section */
    .qr-section {
      margin-top: 2rem;
      text-align: center;
    }

    .qr-section h2 {
      font-size: 1.1rem;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .download-qr-btn {
      padding: 0.6rem 1.5rem;
    }

    .qr-status {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: 0.75rem;
    }

    .qr-buttons {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    /* Selection mode for individual QR download */
    .select-col {
      display: none;
    }

    .select-mode .select-col {
      display: table-cell;
    }

    .select-col input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--gold);
      cursor: pointer;
    }

    .select-controls {
      display: none;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .select-mode .select-controls {
      display: flex;
    }

    .select-controls button {
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
    }

    .select-count {
      color: var(--gold);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .select-mode .qr-buttons .hide-in-select {
      display: none;
    }

    @media (max-width: 600px) {
      .form-row {
        flex-direction: column;
      }

      .form-field {
        min-width: unset;
      }

      .roster-table {
        font-size: 0.8rem;
      }

      .roster-table th,
      .roster-table td {
        padding: 0.5rem;
      }
    }
  </style>
</head>

<body>

  <div id="main-header-placeholder"></div>

  <div id="main-content">
    <main class="page-content" style="max-width: 1200px;">

      <div class="roster-header">
        <h1>Member Roster</h1>
        <button id="logoutBtn" class="btn btn-gold logout-btn">Sign Out</button>
      </div>

      <!-- Add member form -->
      <div class="add-form">
        <h2>Add Member</h2>
        <form id="addMemberForm">
          <div class="form-row">
            <div class="form-field">
              <label for="memberName">Full Name</label>
              <input type="text" id="memberName" placeholder="Jane Murphy" required>
            </div>
            <div class="form-field">
              <label for="memberEmail">Email</label>
              <input type="email" id="memberEmail" placeholder="jane@example.com" required>
            </div>
            <button type="submit" id="addBtn" class="btn btn-gold add-btn">Add Member</button>
          </div>
        </form>
        <div id="formError" class="form-error"></div>
        <div id="credentialCard" class="credential-card">
          <h3>Member Added</h3>
          <div class="cred-row"><span class="cred-label">Name:</span><span id="credName" class="cred-value"></span></div>
          <div class="cred-row"><span class="cred-label">Email:</span><span id="credEmail" class="cred-value"></span></div>
          <div class="cred-row"><span class="cred-label">Username:</span><span id="credUsername" class="cred-value"></span></div>
          <div class="cred-row"><span class="cred-label">PIN:</span><span id="credPin" class="cred-value"></span></div>
          <div class="cred-row"><span class="cred-label">Member ID:</span><span id="credId" class="cred-value"></span></div>
        </div>
      </div>

      <!-- Roster table -->
      <div class="roster-section">
        <h2>Current Members <span id="memberCount" class="roster-count"></span>
          <button id="sendAllBtn" class="btn btn-gold send-all-btn" style="display:none;">Send All Setup Emails</button>
        </h2>
        <div class="roster-table-wrap">
          <table class="roster-table">
            <thead>
              <tr>
                <th class="select-col"><input type="checkbox" id="selectAllCb" title="Select all"></th>
                <th>Name</th>
                <th>Email</th>
                <th>Member ID</th>
                <th>Username</th>
                <th>Paid</th>
                <th>Setup</th>
                <th>Expires</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="rosterBody">
              <tr><td colspan="9" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- QR Code Download -->
      <div class="qr-section">
        <h2>QR Codes for Engraver</h2>
        <div class="qr-buttons">
          <button id="downloadEngraverBtn" class="btn btn-gold download-qr-btn hide-in-select" disabled>Download All (SVG + PNG)</button>
          <button id="selectEngraverBtn" class="btn btn-gold download-qr-btn hide-in-select" disabled>Select Members to Download</button>
          <button id="downloadSelectedBtn" class="btn btn-gold download-qr-btn" style="display:none;" disabled>Download 0 Selected</button>
          <button id="cancelSelectBtn" class="btn btn-gold download-qr-btn" style="display:none;" onclick="exitSelectMode()">Cancel</button>
        </div>
        <div class="select-controls">
          <button class="btn btn-gold" onclick="selectAllMembers()">Select All</button>
          <button class="btn btn-gold" onclick="selectNoneMembers()">Select None</button>
          <span class="select-count" id="selectCount">0 selected</span>
        </div>
        <div id="qrStatus" class="qr-status"></div>
      </div>

      <div class="portal-footer">
        <a href="home.html">Admin Portal</a>
        <a href="/membership-tools/admin-import.html">Import Members</a>
        <a href="/membership-tools/admin-qr.html">Generate QR Codes</a>
      </div>

    </main>

    <div id="main-footer-placeholder"></div>
  </div>

  <script src="/js/main.js"></script>
  <script src="/js/admin-auth.js"></script>
  <script>
    var adminPassword = getAdminPassword();
    var boardUser = sessionStorage.getItem('boardUser') || '';
    var isTechAdmin = (boardUser === 'mug.sea');

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function () {
      adminLogout();
    });

    // Load roster on page load
    loadRoster();

    // Add member form submission
    document.getElementById('addMemberForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      var nameInput = document.getElementById('memberName');
      var emailInput = document.getElementById('memberEmail');
      var addBtn = document.getElementById('addBtn');
      var errorEl = document.getElementById('formError');
      var credCard = document.getElementById('credentialCard');

      var name = nameInput.value.trim();
      var email = emailInput.value.trim();

      if (!name || !email) return;

      addBtn.disabled = true;
      addBtn.textContent = 'Adding...';
      errorEl.classList.remove('visible');
      credCard.classList.remove('visible');

      try {
        var res = await fetch('/api/members/roster', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminPassword: adminPassword, name: name, email: email })
        });

        var data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Failed to add member';
          errorEl.classList.add('visible');
          return;
        }

        // Show credentials
        document.getElementById('credName').textContent = data.member.name;
        document.getElementById('credEmail').textContent = data.member.email;
        document.getElementById('credUsername').textContent = data.member.username;
        document.getElementById('credPin').textContent = data.member.pin;
        document.getElementById('credId').textContent = data.member.memberId;
        credCard.classList.add('visible');

        // Clear form
        nameInput.value = '';
        emailInput.value = '';
        nameInput.focus();

        // Refresh roster
        loadRoster();

      } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.classList.add('visible');
      } finally {
        addBtn.disabled = false;
        addBtn.textContent = 'Add Member';
      }
    });

    // Load and render roster table
    async function loadRoster() {
      var tbody = document.getElementById('rosterBody');
      var countEl = document.getElementById('memberCount');
      var sendAllBtn = document.getElementById('sendAllBtn');

      try {
        var res = await fetch('/api/members?adminPassword=' + encodeURIComponent(adminPassword));
        var data = await res.json();

        if (!res.ok || !data.members) {
          tbody.innerHTML = '<tr><td colspan="9" class="empty-state">Failed to load roster</td></tr>';
          return;
        }

        var members = data.members;
        countEl.textContent = '(' + members.length + ')';

        if (members.length === 0) {
          tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No members yet. Add one above.</td></tr>';
          return;
        }

        // Show Send All button only for mug.sea if any members haven't been sent setup email
        var unsentCount = members.filter(function (m) { return !m.setupEmailSent; }).length;
        if (isTechAdmin && unsentCount > 0) {
          sendAllBtn.style.display = 'inline-block';
          sendAllBtn.textContent = 'Send All Setup Emails (' + unsentCount + ')';
        } else {
          sendAllBtn.style.display = 'none';
        }

        // Sort by name
        members.sort(function (a, b) {
          return (a.name || '').localeCompare(b.name || '');
        });

        tbody.innerHTML = members.map(function (m) {
          var paidClass = m.paid ? 'paid' : 'unpaid';
          var setupClass = m.setupEmailSent ? 'sent' : 'unsent';
          var setupLabel = m.setupEmailSent ? 'Sent' : (isTechAdmin ? 'Send' : '—');
          var actionBtns = '';
          if (isTechAdmin) {
            actionBtns = '<button class="edit-btn" data-id="' + escapeHtml(m.id) + '">Edit</button> ' +
              '<button class="remove-btn" data-id="' + escapeHtml(m.id) + '" data-name="' + escapeHtml(m.name) + '">Remove</button>';
          } else {
            actionBtns = '<span class="remove-msg">Email <a href="mailto:tech@in-nola.org">tech@in-nola.org</a></span>';
          }
          return '<tr data-member-id="' + escapeHtml(m.id) + '">' +
            '<td class="select-col"><input type="checkbox" class="member-select-cb" data-id="' + escapeHtml(m.id) + '"></td>' +
            '<td data-field="name">' + escapeHtml(m.name) + '</td>' +
            '<td data-field="email">' + escapeHtml(m.email) + '</td>' +
            '<td>' + escapeHtml(m.id) + '</td>' +
            '<td>' + escapeHtml(m.username) + '</td>' +
            '<td><span class="paid-toggle ' + paidClass + '" data-id="' + escapeHtml(m.id) + '" data-paid="' + (m.paid ? '1' : '0') + '"><span class="toggle-track"></span><span class="toggle-thumb"></span></span></td>' +
            '<td>' + (isTechAdmin
              ? '<span class="setup-badge ' + setupClass + '" data-id="' + escapeHtml(m.id) + '" data-name="' + escapeHtml(m.name) + '">' + setupLabel + '</span>'
              : (m.setupEmailSent ? '<span class="setup-badge sent" style="cursor:default;">Sent</span>' : '<span style="color:var(--text-secondary);font-size:0.8rem;">—</span>')) + '</td>' +
            '<td data-field="expirationDate">' + escapeHtml(m.expirationDate) + '</td>' +
            '<td>' + actionBtns + '</td>' +
            '</tr>';
        }).join('');

      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">Error loading roster</td></tr>';
      }
    }

    // Handle remove button clicks (delegated) — mug.sea only
    document.getElementById('rosterBody').addEventListener('click', async function (e) {
      var btn = e.target.closest('.remove-btn');
      if (!btn) return;

      var memberId = btn.getAttribute('data-id');
      var memberName = btn.getAttribute('data-name');

      var comment = prompt('Remove ' + memberName + ' from the roster?\n\nThis cannot be undone. Please enter a reason:');
      if (comment === null) return; // cancelled
      if (!comment.trim()) {
        alert('A reason is required to remove a member.');
        return;
      }

      btn.disabled = true;
      btn.textContent = '...';

      try {
        var res = await fetch('/api/members/roster', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            adminPassword: adminPassword,
            memberId: memberId,
            username: boardUser,
            comment: comment.trim()
          })
        });

        var data = await res.json();

        if (!res.ok) {
          alert(data.error || 'Failed to remove member');
          btn.disabled = false;
          btn.textContent = 'Remove';
          return;
        }

        loadRoster();

      } catch (err) {
        alert('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Remove';
      }
    });

    // Handle paid toggle (delegated)
    document.getElementById('rosterBody').addEventListener('click', async function (e) {
      var toggle = e.target.closest('.paid-toggle');
      if (!toggle) return;

      var memberId = toggle.getAttribute('data-id');
      var currentlyPaid = toggle.getAttribute('data-paid') === '1';
      var newPaid = !currentlyPaid;

      // Optimistic update
      toggle.setAttribute('data-paid', newPaid ? '1' : '0');
      toggle.className = 'paid-toggle ' + (newPaid ? 'paid' : 'unpaid');

      try {
        var res = await fetch('/api/members/admin-update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            adminPassword: adminPassword,
            updates: [{ id: memberId, paid: newPaid }]
          })
        });

        if (!res.ok) {
          // Revert on failure
          toggle.setAttribute('data-paid', currentlyPaid ? '1' : '0');
          toggle.className = 'paid-toggle ' + (currentlyPaid ? 'paid' : 'unpaid');
        }

      } catch (err) {
        toggle.setAttribute('data-paid', currentlyPaid ? '1' : '0');
        toggle.className = 'paid-toggle ' + (currentlyPaid ? 'paid' : 'unpaid');
      }
    });

    // Handle edit button clicks (delegated) — mug.sea only
    document.getElementById('rosterBody').addEventListener('click', function (e) {
      var btn = e.target.closest('.edit-btn');
      if (!btn) return;

      var row = btn.closest('tr');
      var memberId = row.getAttribute('data-member-id');

      // Get editable cells
      var nameCell = row.querySelector('[data-field="name"]');
      var emailCell = row.querySelector('[data-field="email"]');
      var expiresCell = row.querySelector('[data-field="expirationDate"]');

      // Store original values
      var origName = nameCell.textContent;
      var origEmail = emailCell.textContent;
      var origExpires = expiresCell.textContent;

      // Replace cell contents with inputs
      nameCell.innerHTML = '<input class="inline-edit" type="text" value="' + escapeHtml(origName) + '">';
      emailCell.innerHTML = '<input class="inline-edit" type="email" value="' + escapeHtml(origEmail) + '">';
      expiresCell.innerHTML = '<input class="inline-edit" type="date" value="' + escapeHtml(origExpires) + '">';

      // Replace action buttons with Save/Cancel
      var actionsCell = btn.closest('td');
      actionsCell.innerHTML = '<span class="edit-actions">' +
        '<button class="save-btn" data-id="' + escapeHtml(memberId) + '">Save</button>' +
        '<button class="cancel-btn">Cancel</button>' +
        '</span>';

      // Focus the name input
      nameCell.querySelector('input').focus();
    });

    // Handle save button clicks (delegated)
    document.getElementById('rosterBody').addEventListener('click', async function (e) {
      var btn = e.target.closest('.save-btn');
      if (!btn) return;

      var row = btn.closest('tr');
      var memberId = btn.getAttribute('data-id');

      var newName = row.querySelector('[data-field="name"] input').value.trim();
      var newEmail = row.querySelector('[data-field="email"] input').value.trim();
      var newExpires = row.querySelector('[data-field="expirationDate"] input').value;

      if (!newName || !newEmail) {
        alert('Name and email are required.');
        return;
      }

      btn.disabled = true;
      btn.textContent = '...';

      try {
        var res = await fetch('/api/members/admin-update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            adminPassword: adminPassword,
            updates: [{
              id: memberId,
              displayName: newName,
              email: newEmail,
              expirationDate: newExpires
            }]
          })
        });

        if (!res.ok) {
          var data = await res.json();
          alert(data.error || 'Failed to save changes');
          btn.disabled = false;
          btn.textContent = 'Save';
          return;
        }

        loadRoster();

      } catch (err) {
        alert('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Save';
      }
    });

    // Handle cancel button clicks (delegated)
    document.getElementById('rosterBody').addEventListener('click', function (e) {
      var btn = e.target.closest('.cancel-btn');
      if (!btn) return;

      loadRoster();
    });

    // Handle setup email badge clicks (delegated)
    document.getElementById('rosterBody').addEventListener('click', async function (e) {
      var badge = e.target.closest('.setup-badge');
      if (!badge) return;

      var memberId = badge.getAttribute('data-id');
      var memberName = badge.getAttribute('data-name');
      var alreadySent = badge.classList.contains('sent');

      if (alreadySent) {
        if (!confirm('Setup email was already sent to ' + memberName + '. Send again? This will generate a new PIN.')) return;
      }

      badge.textContent = '...';

      try {
        var res = await fetch('/api/members/send-setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminPassword: adminPassword, memberId: memberId })
        });

        var data = await res.json();

        if (!res.ok) {
          alert(data.error || 'Failed to send setup email');
          badge.textContent = alreadySent ? 'Sent' : 'Send';
          return;
        }

        // Update badge inline
        badge.className = 'setup-badge sent';
        badge.textContent = 'Sent';

      } catch (err) {
        alert('Network error. Please try again.');
        badge.textContent = alreadySent ? 'Sent' : 'Send';
      }
    });

    // Handle Send All button
    document.getElementById('sendAllBtn').addEventListener('click', async function () {
      var btn = this;
      var badges = document.querySelectorAll('.setup-badge.unsent');

      if (badges.length === 0) {
        alert('All members have already received setup emails.');
        return;
      }

      if (!confirm('Send setup emails to ' + badges.length + ' member(s) who haven\'t received one yet?\n\nThis will generate a fresh PIN for each member.')) return;

      btn.disabled = true;
      btn.textContent = 'Sending...';

      var sent = 0;
      var failed = 0;

      for (var i = 0; i < badges.length; i++) {
        var badge = badges[i];
        var memberId = badge.getAttribute('data-id');
        badge.textContent = '...';

        try {
          var res = await fetch('/api/members/send-setup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adminPassword: adminPassword, memberId: memberId })
          });

          if (res.ok) {
            badge.className = 'setup-badge sent';
            badge.textContent = 'Sent';
            sent++;
          } else {
            badge.textContent = 'Send';
            failed++;
          }
        } catch (err) {
          badge.textContent = 'Send';
          failed++;
        }
      }

      btn.disabled = false;
      if (failed === 0) {
        btn.style.display = 'none';
        alert('Setup emails sent to ' + sent + ' member(s).');
      } else {
        btn.textContent = 'Send All Setup Emails (' + failed + ')';
        alert('Sent: ' + sent + ', Failed: ' + failed + '. You can retry the failed ones.');
      }
    });

    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── QR Code Download ────────────────────────────────────────────────

    var cachedMembers = [];
    var selectedMemberIds = new Set();
    var inSelectMode = false;

    // Enable QR buttons once roster loads (patched into loadRoster)
    var _origLoadRoster = loadRoster;
    loadRoster = async function () {
      await _origLoadRoster();
      // Cache members for QR generation
      try {
        var res = await fetch('/api/members?adminPassword=' + encodeURIComponent(adminPassword));
        var data = await res.json();
        if (data.members && data.members.length > 0) {
          cachedMembers = data.members;
          document.getElementById('downloadEngraverBtn').disabled = false;
          document.getElementById('selectEngraverBtn').disabled = false;
        }
      } catch (e) {}
      // Restore checkbox state if in select mode
      if (inSelectMode) {
        document.querySelectorAll('.member-select-cb').forEach(function (cb) {
          cb.checked = selectedMemberIds.has(cb.getAttribute('data-id'));
        });
      }
    };
    // Re-run to apply the patch
    loadRoster();

    // ── Selection mode ──────────────────────────────────────────────────

    document.getElementById('selectEngraverBtn').addEventListener('click', enterSelectMode);
    document.getElementById('downloadSelectedBtn').addEventListener('click', downloadSelectedEngraver);

    function enterSelectMode() {
      inSelectMode = true;
      selectedMemberIds.clear();
      document.querySelector('.roster-section').classList.add('select-mode');
      document.querySelector('.qr-section').classList.add('select-mode');
      document.getElementById('downloadSelectedBtn').style.display = 'inline-block';
      document.getElementById('cancelSelectBtn').style.display = 'inline-block';
      document.getElementById('selectAllCb').checked = false;
      updateSelectCount();
    }

    function exitSelectMode() {
      inSelectMode = false;
      selectedMemberIds.clear();
      document.querySelector('.roster-section').classList.remove('select-mode');
      document.querySelector('.qr-section').classList.remove('select-mode');
      document.getElementById('downloadSelectedBtn').style.display = 'none';
      document.getElementById('cancelSelectBtn').style.display = 'none';
      document.querySelectorAll('.member-select-cb').forEach(function (cb) { cb.checked = false; });
      document.getElementById('selectAllCb').checked = false;
      document.getElementById('qrStatus').textContent = '';
    }

    function updateSelectCount() {
      var count = selectedMemberIds.size;
      document.getElementById('selectCount').textContent = count + ' selected';
      var dlBtn = document.getElementById('downloadSelectedBtn');
      dlBtn.disabled = count === 0;
      dlBtn.textContent = 'Download ' + count + ' Selected';
    }

    // Delegated click handler for member checkboxes
    document.getElementById('rosterBody').addEventListener('change', function (e) {
      var cb = e.target.closest('.member-select-cb');
      if (!cb) return;
      var id = cb.getAttribute('data-id');
      if (cb.checked) {
        selectedMemberIds.add(id);
      } else {
        selectedMemberIds.delete(id);
      }
      updateSelectCount();
      // Update select-all checkbox
      var allCbs = document.querySelectorAll('.member-select-cb');
      document.getElementById('selectAllCb').checked = selectedMemberIds.size === allCbs.length && allCbs.length > 0;
    });

    // Select-all header checkbox
    document.getElementById('selectAllCb').addEventListener('change', function () {
      if (this.checked) {
        selectAllMembers();
      } else {
        selectNoneMembers();
      }
    });

    function selectAllMembers() {
      document.querySelectorAll('.member-select-cb').forEach(function (cb) {
        cb.checked = true;
        selectedMemberIds.add(cb.getAttribute('data-id'));
      });
      document.getElementById('selectAllCb').checked = true;
      updateSelectCount();
    }

    function selectNoneMembers() {
      document.querySelectorAll('.member-select-cb').forEach(function (cb) {
        cb.checked = false;
      });
      selectedMemberIds.clear();
      document.getElementById('selectAllCb').checked = false;
      updateSelectCount();
    }

    // ── Engraver QR Download (individual SVG + PNG in ZIP) ──────────────

    document.getElementById('downloadEngraverBtn').addEventListener('click', function () {
      generateEngraverQR(cachedMembers.map(function (m) { return m.id; }), 'all');
    });

    function downloadSelectedEngraver() {
      if (selectedMemberIds.size === 0) return;
      generateEngraverQR(Array.from(selectedMemberIds), 'selected');
    }

    async function generateEngraverQR(memberIds, mode) {
      var btn = mode === 'selected' ? document.getElementById('downloadSelectedBtn') : document.getElementById('downloadEngraverBtn');
      var statusEl = document.getElementById('qrStatus');
      var origText = btn.textContent;

      btn.disabled = true;
      btn.textContent = 'Generating...';
      statusEl.textContent = 'Fetching QR data for ' + memberIds.length + ' member(s)...';

      try {
        var res = await fetch('/api/members/qr/batch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminPassword: adminPassword, memberIds: memberIds })
        });

        var data = await res.json();
        if (!res.ok || !data.qrData) {
          statusEl.textContent = 'Failed to fetch QR data.';
          btn.disabled = false;
          btn.textContent = origText;
          return;
        }

        statusEl.textContent = 'Generating ' + data.qrData.length + ' SVG + PNG files...';

        var zip = new JSZip();
        var svgFolder = zip.folder('svg');
        var pngFolder = zip.folder('png');
        var readmeLines = ['IN-NOLA Member QR Codes — Engraver Package', '==========================================', ''];
        readmeLines.push('Generated: ' + new Date().toLocaleDateString());
        readmeLines.push('Total members: ' + data.qrData.length);
        readmeLines.push('');
        readmeLines.push('Files:');
        readmeLines.push('  svg/  — Vector SVG files (scalable, best for laser engraving)');
        readmeLines.push('  png/  — High-res 1000x1000 PNG files (fallback)');
        readmeLines.push('');
        readmeLines.push('Settings: Error correction H (highest), 1000x1000px, 4-module padding');
        readmeLines.push('');
        readmeLines.push('Member List:');
        readmeLines.push('─────────────────────────────────────');

        for (var i = 0; i < data.qrData.length; i++) {
          var item = data.qrData[i];
          var safeName = item.name.replace(/[^a-zA-Z0-9 ]/g, '').replace(/\s+/g, '-');
          var fileName = 'IN-NOLA-QR-' + item.id + '-' + safeName;

          statusEl.textContent = 'Processing ' + (i + 1) + ' of ' + data.qrData.length + ': ' + item.name;

          // Generate SVG using qrcode-svg (exposed as global QRCodeSVG)
          var qr = new QRCodeSVG({
            content: item.qrString,
            width: 1000,
            height: 1000,
            padding: 4,
            color: '#000000',
            background: '#ffffff',
            ecl: 'H'
          });
          var svgString = qr.svg();
          svgFolder.file(fileName + '.svg', svgString);

          // Render SVG to canvas for PNG
          var pngDataUrl = await svgToPng(svgString, 1000, 1000);
          var pngBase64 = pngDataUrl.split(',')[1];
          pngFolder.file(fileName + '.png', pngBase64, { base64: true });

          readmeLines.push('  ' + item.id + '  ' + item.name + '  (' + (item.memberType || 'Member') + ')');
        }

        statusEl.textContent = 'Creating ZIP file...';

        readmeLines.push('');
        readmeLines.push('─────────────────────────────────────');
        readmeLines.push('Irish Network New Orleans — in-nola.org');
        zip.file('README.txt', readmeLines.join('\n'));

        var zipName = mode === 'selected' ? 'IN-NOLA-QR-Engraver-Selected.zip' : 'IN-NOLA-QR-Engraver.zip';
        var blob = await zip.generateAsync({ type: 'blob' });
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = zipName;
        link.click();
        URL.revokeObjectURL(link.href);

        statusEl.textContent = data.qrData.length + ' engraver-ready QR codes downloaded.';

        if (mode === 'selected') {
          exitSelectMode();
        }

      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = origText;
      }
    }

    function svgToPng(svgString, width, height) {
      return new Promise(function (resolve, reject) {
        var canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        var ctx = canvas.getContext('2d');
        var img = new Image();
        var blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        img.onload = function () {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img, 0, 0, width, height);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL('image/png'));
        };
        img.onerror = function () {
          URL.revokeObjectURL(url);
          reject(new Error('Failed to render SVG to PNG'));
        };
        img.src = url;
      });
    }
  </script>

</body>
