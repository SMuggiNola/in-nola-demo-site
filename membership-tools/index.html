<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login - IN-NOLA</title>
    <link rel="stylesheet" href="css/membership.css">
</head>
<body>
    <div class="container">
        <header class="portal-header">
            <h1>Irish Network NOLA</h1>
            <p class="subtitle">Member Portal</p>
        </header>

        <div class="celtic-border card">
            <div id="message" class="message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required
                           placeholder="e.g. mac.sha" autocomplete="username"
                           autocapitalize="none">
                </div>

                <div class="form-group">
                    <label for="password">PIN</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Your PIN or password" autocomplete="current-password"
                           maxlength="40">
                </div>

                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <div style="text-align: center; margin-top: 0.75rem;">
                <a href="/admin-portal/index.html" id="forgotLink" style="color: var(--celtic-gold); font-size: 0.85rem; text-decoration: none; opacity: 0.7;">Forgot your PIN?</a>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Signing in...</p>
            </div>
        </div>

        <div class="celtic-border card" style="margin-top: 24px;">
            <h3 style="text-align: center; color: var(--gold); margin-bottom: 8px; font-size: 1.1rem;">First Time Access / Replace My PIN</h3>
            <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 16px;">Enter your email to receive your username and a fresh PIN.</p>

            <div id="credMessage" class="message"></div>

            <form id="credForm">
                <div class="form-group">
                    <label for="credEmail">Email Address</label>
                    <input type="email" id="credEmail" name="email" required
                           placeholder="you@example.com" autocomplete="email">
                </div>
                <button type="submit" class="btn btn-secondary" style="width: 100%;">Send My Credentials</button>
            </form>

            <div class="loading" id="credLoading">
                <div class="spinner"></div>
                <p>Sending...</p>
            </div>
        </div>

        <p style="text-align: center; margin-top: 20px; font-size: 0.85rem; opacity: 0.7;">
            <a href="/index.html" style="color: var(--celtic-gold);">Return to Home</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        window.Auth.redirectIfAuthenticated();

        const form = document.getElementById('loginForm');
        const messageEl = document.getElementById('message');
        const loadingEl = document.getElementById('loading');

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type + ' show';
        }

        function hideMessage() {
            messageEl.className = 'message';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                form.style.display = 'none';
                loadingEl.classList.add('show');
            } else {
                form.style.display = 'block';
                loadingEl.classList.remove('show');
            }
        }

        // ── Credential request form ──
        const credForm = document.getElementById('credForm');
        const credMessageEl = document.getElementById('credMessage');
        const credLoadingEl = document.getElementById('credLoading');

        credForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            credMessageEl.className = 'message';

            const email = document.getElementById('credEmail').value.trim();
            if (!email) return;

            credForm.style.display = 'none';
            credLoadingEl.classList.add('show');

            try {
                const resp = await fetch('/api/members/send-credentials', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await resp.json();
                credMessageEl.textContent = data.message || 'If this email is registered, your credentials have been sent.';
                credMessageEl.className = 'message success show';
            } catch (err) {
                credMessageEl.textContent = 'Service unavailable. Please try again later.';
                credMessageEl.className = 'message error show';
            }

            credLoadingEl.classList.remove('show');
            credForm.style.display = 'block';
        });

        // ── Login form ──
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            hideMessage();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showMessage('Please enter both username and PIN', 'error');
                return;
            }

            setLoading(true);

            const result = await window.Auth.login(username, password);

            if (result.success) {
                showMessage('Login successful! Redirecting...', 'success');

                // Role-based redirect
                const role = result.user.role;
                let redirect = 'certificate.html';
                if (role === 'scanner') {
                    redirect = 'scanner.html';
                } else if (role === 'board' || role === 'architect') {
                    // Board/architect can access member cert but also admin portal
                    redirect = 'certificate.html';
                }

                setTimeout(function() {
                    window.location.href = redirect;
                }, 500);
            } else {
                setLoading(false);
                showMessage(result.error, 'error');
            }
        });
    </script>
</body>
</html>
