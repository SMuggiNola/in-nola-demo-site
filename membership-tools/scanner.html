<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Scanner - IN-NOLA</title>
    <link rel="stylesheet" href="css/membership.css">
</head>
<body>
    <div class="container">
        <header class="portal-header">
            <h1>Irish Network NOLA</h1>
            <p class="subtitle">Admin Verification Scanner</p>
        </header>

        <!-- Scanner Section -->
        <div id="scannerSection" class="scanner-container">
            <div class="celtic-border card">
                <div class="scanner-header">
                    <h2 style="color: var(--celtic-gold); margin-bottom: 15px;">Scan Member QR Code</h2>
                </div>

                <div id="reader" style="display: none;"></div>

                <div style="text-align: center; margin: 20px 0;">
                    <button id="startScanBtn" class="btn btn-primary">
                        Start Camera
                    </button>
                    <button id="stopScanBtn" class="btn btn-secondary" style="display: none;">
                        Stop Camera
                    </button>
                </div>

                <!-- Verification Result -->
                <div id="verificationResult" class="verification-result">
                    <div id="statusIcon" class="status-icon"></div>
                    <div id="statusText" class="status-text"></div>
                    <div id="memberInfo" class="member-info"></div>
                    <button id="scanAgainBtn" class="btn btn-primary scan-again-btn">
                        Scan Another
                    </button>
                </div>

                <div style="text-align: center; margin-top: 20px;">
                    <button id="exitBtn" class="btn btn-secondary" style="width: 100%;">Log Out</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/admin-auth.js"></script>
    <!-- Load QR library with defer so it doesn't block page render -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="js/scanner.js"></script>
    <script>
        // Wire up buttons after all scripts are loaded
        document.getElementById('startScanBtn').addEventListener('click', function() {
            if (window.Scanner) window.Scanner.startScanner();
        });
        document.getElementById('stopScanBtn').addEventListener('click', function() {
            if (window.Scanner) window.Scanner.stopScanner();
        });
        document.getElementById('scanAgainBtn').addEventListener('click', function() {
            if (window.Scanner) window.Scanner.scanAgain();
        });
        document.getElementById('exitBtn').addEventListener('click', function() {
            if (window.Scanner) window.Scanner.stopScanner();
            adminLogout();
        });
    </script>
</body>
</html>
